<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>レジの助 | レジ・管理画面</title>
    
    <!-- Stitch Design System (Tailwind & Fonts) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#f8f9fa",
                        "on-background": "#191c1d",
                        "surface": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "on-surface-variant": "#444748",
                        "primary": "#5d5f5f",
                        "on-primary": "#ffffff",
                        "secondary": "#0058bb",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#1471e6",
                        "on-secondary-container": "#fefcff",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "outline": "#747878",
                        "outline-variant": "#c4c7c8",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-highest": "#e1e3e4"
                    },
                    fontFamily: {
                        "headline-lg": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-md": ["Plus Jakarta Sans", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "label-lg": ["Inter", "sans-serif"],
                        "label-sm": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #f8f9fa;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen">
    <header class="bg-surface-container-lowest border-b border-outline-variant px-6 py-4 flex items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">storefront</span>
            <div class="font-headline-lg text-[22px] font-bold text-secondary">
                レジの助
                <span class="font-body-md text-[14px] text-on-surface-variant font-normal ml-2">スタッフ用管理画面</span>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-[1400px] mx-auto">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="font-headline-lg text-[28px] font-bold text-on-surface">稼働状況一覧</h1>
                <p class="font-body-md text-on-surface-variant">各卓の注文状況と金額を確認・精算します。</p>
            </div>
        </div>

        <div id="adminGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <p class="text-on-surface-variant">読み込み中...</p>
        </div>
    </main>
    
    <script src="admin.js"></script>
</body>
</html>
