<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レジの助 | レジ・管理画面</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-checked-out { background: rgba(148, 163, 184, 0.2); color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="brand">レジの助 <span style="font-size: 1rem; color: var(--text-secondary);">スタッフ用管理画面</span></div>
    </header>

    <div class="container" style="max-width: 1400px;">
        <h2>稼働状況一覧</h2>
        <div id="adminGrid" class="admin-grid">
            <p>読み込み中...</p>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
