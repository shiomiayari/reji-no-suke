name: CI Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Syntax and Build Check (Wrangler Dry Run)
        run: npx wrangler deploy --dry-run --outdir=dist

      # NOTE: もし今後ESLintやVitestなどのテストツールを導入した場合は、
      # 以下のようにステップを追加することでデプロイ前のチェックを強化できます。
      # - name: Run Linter
      #   run: npm run lint
      # - name: Run Tests
      #   run: npm run test
